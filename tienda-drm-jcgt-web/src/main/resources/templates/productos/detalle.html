<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{layout/base :: head(titulo=${p.nombre})}"></head>

<body class="d-flex flex-column h-100">

<nav th:replace="~{layout/base :: navbar}"></nav>

<main class="container my-5">
    <div class="card shadow-sm border-0 p-4">
        <div class="row">
            <div class="col-md-6 position-relative">
                <div th:if="${p.descuento > 0}"
                     class="badge bg-danger position-absolute top-0 start-0 m-3 p-2"
                     th:text="${'-' + p.descuento + '%'}"></div>

                <img th:if="${p.imagen != null && !p.imagen.isEmpty()}"
                     th:src="@{${p.imagen}}"
                     th:alt="${'Imagen de ' + p.nombre}"
                     class="img-fluid rounded shadow-sm">

                <img th:unless="${p.imagen != null && !p.imagen.isEmpty()}"
                     th:src="@{/imagenes/image_not_found.jpg}"
                     class="img-fluid rounded shadow-sm"
                     alt="Imagen no disponible">
            </div>

            <div class="col-md-6">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/productos}">Productos</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="${p.nombre}"></li>
                    </ol>
                </nav>

                <h1 class="display-5 fw-bold" th:text="${p.nombre}">Nombre</h1>
                <p class="text-primary h4" th:if="${p.marca != null}" th:text="${p.marca}"></p>

                <div class="bg-light p-3 my-4 border-start border-4 border-info">
                    <strong>Código EAN-13:</strong>
                    <code class="h5 ms-2" th:text="${p.codigoEan}"></code>
                </div>

                <div class="mb-4">
                        <span th:if="${p.descuento > 0}"
                              class="text-muted text-decoration-line-through h4 me-3"
                              th:text="${#numbers.formatDecimal(p.precio, 1, 2) + '€'}"></span>
                    <span class="text-dark display-6 fw-bold"
                          th:text="${#numbers.formatDecimal(p.descuento > 0 ? (p.precio * (1 - p.descuento/100.0)) : p.precio, 1, 2) + '€'}">
                        </span>
                </div>

                <hr>

                <h3>Descripción Completa</h3>
                <p class="lead" style="white-space: pre-line;" th:text="${p.descripcion}"></p>

                <div class="d-grid gap-2 mt-5">
                    <button class="btn btn-dark btn-lg" type="button">Añadir al carrito</button>
                    <a th:href="@{/productos}" class="btn btn-outline-secondary">Volver al catálogo</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/base :: footer}"></footer>

</body>
</html>
