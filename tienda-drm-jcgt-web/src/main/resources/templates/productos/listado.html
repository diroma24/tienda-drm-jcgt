<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{layout/base :: head(titulo='Productos')}"></head>

<body class="d-flex flex-column h-100">

<style>
    /* Estilo del Badge igual al de Detalles */
    .badge-oferta {
        position: absolute;
        top: 0;
        left: 0;
        margin: 1rem; /* Equivalente a m-3 de Bootstrap */
        padding: 0.5rem; /* Equivalente a p-2 */
        z-index: 10;
    }

    /* Ajustes para que la card se parezca a la imagen de referencia */
    .card-title-link {
        text-decoration: none;
        color: #007bff;
        font-weight: bold;
        font-size: 1rem;
        display: block;
        margin-bottom: 0.5rem;
    }
    .marca-link {
        color: #00bfff;
        font-weight: bold;
        text-decoration: none;
        font-size: 0.85rem;
    }
    .cat-link {
        color: #007bff;
        text-decoration: underline;
        font-size: 0.9rem;
        margin-right: 5px;
    }
    .precio-tachado {
        text-decoration: line-through;
        color: #6c757d;
        font-size: 0.9rem;
        margin-right: 8px;
    }
    .precio-final {
        color: #212529;
        font-size: 1.1rem;
        font-weight: 500;
    }
    .btn-ver-detalle {
        background-color: #388e3c;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 10px;
        text-align: center;
        text-decoration: none;
        display: block;
        margin-top: 10px;
    }
    .btn-ver-detalle:hover {
        background-color: #2e7d32;
        color: white;
    }
</style>

<nav th:replace="~{layout/base :: navbar}"></nav>

<header th:replace="~{layout/base :: header-seccion(
        titulo='Catálogo de Productos',
        subtitulo='Explora nuestra selección de sobres, mazos y accesorios reales.')}">
</header>

<main class="container mb-5">
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">

        <div class="col" th:each="p : ${productos}">
            <div class="card h-100 border-0 shadow-sm position-relative">

                <div th:if="${p.descuento > 0}"
                     class="badge bg-danger badge-oferta"
                     th:text="${'-' + p.descuento + '%'}"></div>

                <div class="p-3 text-center">
                    <img th:src="${p.imagen != null && !p.imagen.isEmpty()} ? @{${p.imagen}} : @{/imagenes/image_not_found.jpg}"
                         class="img-fluid"
                         style="height: 180px; object-fit: contain;"
                         th:alt="${p.nombre}">
                </div>

                <div class="card-body d-flex flex-column pt-0">
                    <a class="card-title-link"
                       th:href="@{/productos/{id}/{slug}(id=${p.id}, slug=${p.nombre})}"
                       th:text="${p.nombre}">Nombre</a>

                    <div class="mb-2">
                        <a th:href="@{/marcas/{id}(id=${p.marca.id})}"
                           th:text="${p.marca.nombre}" class="marca-link"></a>
                    </div>

                    <div th:if="${not #lists.isEmpty(p.categorias)}" class="mb-3">
                        <p th:if="${#lists.size(p.categorias) == 1}" class="mb-0">
                            <a th:href="@{/categorias/{id}(id=${p.categorias[0].id})}"
                               th:text="${p.categorias[0].nombre}" class="cat-link"></a>
                        </p>
                        <ul th:if="${#lists.size(p.categorias) > 1}" class="list-unstyled d-flex flex-wrap m-0">
                            <li th:each="cat : ${p.categorias}">
                                <a th:href="@{/categorias/{id}(id=${cat.id})}"
                                   th:text="${cat.nombre}" class="cat-link"></a>
                            </li>
                        </ul>
                    </div>

                    <div class="mt-auto">
                        <div class="mb-2">
                                <span th:if="${p.descuento > 0}" class="precio-tachado"
                                      th:text="${#numbers.formatDecimal(p.precio, 1, 'POINT', 2, 'COMMA') + ' €'}"></span>

                            <span class="precio-final"
                                  th:text="${#numbers.formatDecimal(p.descuento > 0 ? (p.precio * (1 - p.descuento/100.0)) : p.precio, 1, 'POINT', 2, 'COMMA') + ' €'}">
                                </span>
                        </div>
                        <a th:href="@{/productos/{id}/{slug}(id=${p.id}, slug=${p.nombre})}" class="btn-ver-detalle">Ver Detalle</a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{layout/base :: footer}"></footer>

</body>
</html>
