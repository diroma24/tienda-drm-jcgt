<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' | Mud & Tree TCG'">Título</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/estilos.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <span style="color: #7cfc00;">Mud</span> & <span style="color: #00bfff;">Tree</span> TCG
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/categorias}">Categorías</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/productos}">Productos</a></li>
                <li class="nav-item"><a class="nav-link btn btn-outline-light ms-lg-3" href="#">Carrito (0)</a></li>
            </ul>
        </div>
    </div>
</nav>

<header th:fragment="header-seccion(titulo, subtitulo)" class="bg-light py-5 mb-5 border-bottom">
    <div class="container text-center">
        <h1 class="display-4 fw-bold" th:text="${titulo}">Título</h1>
        <p class="lead text-muted" th:text="${subtitulo}">Subtítulo</p>
    </div>
</header>

<footer th:fragment="footer" class="bg-dark text-white text-center py-4 mt-auto">
    <div class="container">
        <p class="mb-2">&copy; 2026 Mud & Tree TCG - Diego & Juan Carlos.</p>
        <p class="mb-0">
            <a th:href="@{/sobre-nosotros.html}" class="text-decoration-none" style="color: #7cfc00;">
                Conoce al equipo Mud & Tree
            </a>
            <span class="text-muted mx-2">|</span>
            <a th:href="@{/condiciones}" class="text-decoration-none" style="color: #00bfff;">
                Condiciones de Uso
            </a>
        </p>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</footer>

</body>
</html>
