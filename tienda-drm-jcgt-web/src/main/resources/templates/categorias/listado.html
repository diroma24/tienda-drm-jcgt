<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{layout/base :: head(titulo='Categorías')}"></head>

<body class="d-flex flex-column h-100">

<nav th:replace="~{layout/base :: navbar}"></nav>

<header th:replace="~{layout/base :: header-seccion(
        titulo='Nuestras Categorías',
        subtitulo='Todo lo que un entrenador necesita, organizado por tipo de producto.')}">
</header>

<main class="container mb-5">
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">

        <div class="col" th:each="cat : ${listaCategorias}">
            <div class="card h-100 shadow-sm border-0">

                <img th:if="${cat.imagen != null}"
                     th:src="@{'/imagenes/categorias/' + ${cat.imagen}}"
                     class="card-img-top p-3"
                     th:alt="${cat.nombre}"
                     style="height: 200px; object-fit: contain;">

                <img th:unless="${cat.imagen != null}"
                     th:src="@{'/imagenes/image_not_found.jpg'}"
                     class="card-img-top p-3"
                     alt="Imagen no disponible"
                     style="height: 200px; object-fit: contain;">

                <div class="card-body text-center d-flex flex-column">
                    <h5 class="card-title fw-bold" th:text="${cat.nombre}">Nombre</h5>
                    <p class="card-text text-muted small" th:text="${cat.descripcion}">Descripción</p>

                    <a th:href="@{/categorias/{id}(id=${cat.id})}" class="btn btn-mud-tree mt-auto">Explorar</a>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{layout/base :: footer}"></footer>

</body>
</html>
