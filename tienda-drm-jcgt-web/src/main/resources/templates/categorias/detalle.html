<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{layout/base :: head(titulo=${categoria.nombre})}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/base :: navbar}"></nav>

<main class="container my-5 flex-grow-1">
    <div class="row align-items-center bg-white p-4 rounded shadow-sm border-top border-4 border-success">

        <div class="col-md-4 text-center mb-4 mb-md-0">
            <img th:if="${categoria.imagen != null}"
                 th:src="@{'/imagenes/categorias/' + ${categoria.imagen}}"
                 th:alt="${categoria.nombre}"
                 class="img-fluid rounded" style="max-height: 250px;">

            <img th:unless="${categoria.imagen != null}"
                 th:src="@{/imagenes/image_not_found.jpg}"
                 alt="Imagen no disponible"
                 class="img-fluid rounded opacity-50" style="max-height: 250px;">
        </div>

        <div class="col-md-8">
            <h1 class="display-5 fw-bold" th:text="${categoria.nombre}">Nombre de la Categoría</h1>
            <p class="lead text-muted mt-3" th:text="${categoria.descripcion}">Descripción detallada de la categoría.</p>
            <a th:href="@{/categorias}" class="btn btn-outline-secondary mt-3">&larr; Volver a categorías</a>
        </div>
    </div>

    <div class="mt-5">
        <h3>Productos en esta categoría</h3>
        <hr>
        <div class="alert alert-info text-center">
            <em>El profesor Oak aún está catalogando los productos de esta sección... ¡Próximamente!</em>
        </div>
    </div>
</main>

<footer th:replace="~{layout/base :: footer}"></footer>

</body>
</html>
