<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías | Mud & Tree TCG</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/estilos.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <span style="color: #7cfc00;">Mud</span> & <span style="color: #00bfff;">Tree</span> TCG
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/categorias}">Categorías</a></li>
                <li class="nav-item"><a class="nav-link btn btn-outline-light ms-lg-3" href="#">Carrito (0)</a></li>
            </ul>
        </div>
    </div>
</nav>
<header class="bg-light py-5 mb-5 border-bottom">
    <div class="container text-center">
        <h1 class="display-4 fw-bold">Nuestras Categorías</h1>
        <p class="lead text-muted">Todo lo que un entrenador necesita, organizado por tipo de producto.</p>
    </div>
</header>

<main class="container mb-5">
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">

        <div class="col" th:each="cat : ${listaCategorias}">
            <div class="card h-100 shadow-sm border-0">

                <img th:if="${cat.imagen != null}"
                     th:src="@{'/imagenes/categorias/' + ${cat.imagen}}"
                     class="card-img-top p-3"
                     th:alt="${cat.nombre}"
                     style="height: 200px; object-fit: contain;">

                <img th:unless="${cat.imagen != null}"
                     th:src="@{'/imagenes/categorias/image_not_found.jpg'}"
                     class="card-img-top p-3"
                     alt="Imagen no disponible"
                     style="height: 200px; object-fit: contain;">

                <div class="card-body text-center d-flex flex-column">
                    <h5 class="card-title fw-bold" th:text="${cat.nombre}">Nombre</h5>
                    <p class="card-text text-muted small" th:text="${cat.descripcion}">Descripción</p>

                    <a href="#" class="btn btn-mud-tree mt-auto">Explorar</a>
                </div>
            </div>
        </div>

    </div>
</main>

<footer class="bg-dark text-white text-center py-4 mt-auto">
    <div class="container">
        <p class="mb-2">&copy; 2026 Mud & Tree TCG - Diego & Juan Carlos.</p>
        <p class="mb-0">
            <a th:href="@{/sobre-nosotros.html}" class="text-decoration-none" style="color: #7cfc00;">
                Conoce al equipo Mud & Tree
            </a>
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
