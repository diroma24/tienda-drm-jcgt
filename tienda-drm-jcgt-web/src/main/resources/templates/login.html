<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Mud & Tree TCG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin-top: 100px; }
        .card-header { background-color: #212529; color: white; }
    </style>
</head>
<body>
<div class="container login-container">
    <div class="card shadow">
        <div class="card-header text-center py-3">
            <h4 class="mb-0">Mud & Tree TCG</h4>
            <small>Acceso Clientes</small>
        </div>
        <div class="card-body p-4">

            <!-- MENSAJE DE ERROR: Solo aparece si la URL tiene ?error=true -->
            <div th:if="${param.error}" class="alert alert-danger mb-3">
                Usuario y/o contraseña incorrectos.
            </div>

            <!-- IMPORTANTE: th:action="@{/login}" y method="post" -->
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
            </form>

            <hr>
            <div class="text-center">
                <a th:href="@{/register}" class="text-decoration-none">¿No tienes cuenta? Regístrate aquí</a>
            </div>
            <div class="text-center mt-2">
                <a th:href="@{/}" class="text-muted small">Volver a la tienda</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
