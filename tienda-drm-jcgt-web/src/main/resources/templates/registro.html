<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario - Mud & Tree</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white p-3 text-center">
                    <h2 class="h4 mb-0">Crear Nueva Cuenta</h2>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/register}" th:object="${usuarioDto}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Usuario</label>
                            <input type="text" th:field="*{username}" class="form-control" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" th:field="*{password}" class="form-control" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label fw-bold">Nombre</label>
                                <input type="text" th:field="*{nombre}" class="form-control" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{nombre}"></div>
                            </div>
                            <div class="col">
                                <label class="form-label fw-bold">Apellidos</label>
                                <input type="text" th:field="*{apellidos}" class="form-control" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:errors="*{apellidos}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Fecha de Nacimiento</label>
                            <input type="date" th:field="*{fechaNacimiento}" class="form-control" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{fechaNacimiento}"></div>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" th:field="*{aceptoCondiciones}" class="form-check-input" th:errorclass="is-invalid">
                            <label class="form-check-label">Acepto los términos y condiciones de la tienda TCG</label>
                            <div class="invalid-feedback" th:errors="*{aceptoCondiciones}"></div>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 fw-bold">Registrarse</button>
                        <div class="text-center mt-3">
                            <a th:href="@{/login}" class="text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
