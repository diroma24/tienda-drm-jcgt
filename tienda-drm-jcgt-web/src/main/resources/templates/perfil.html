<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>Mi Perfil de Usuario</h3>
        </div>
        <div class="card-body">
            <p><strong>Nombre de usuario:</strong> <span th:text="${usuario.username}"></span></p>
            <p><strong>Nombre completo:</strong> <span th:text="${usuario.nombre} + ' ' + ${usuario.apellidos}"></span></p>
            <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
            <p><strong>Roles asignados:</strong></p>
            <ul>
                <li th:each="rol : ${usuario.roles}" th:text="${rol.descripcion}"></li>
            </ul>
            <a th:href="@{/}" class="btn btn-secondary">Volver al inicio</a>
        </div>
    </div>
</div>
</body>
</html>
