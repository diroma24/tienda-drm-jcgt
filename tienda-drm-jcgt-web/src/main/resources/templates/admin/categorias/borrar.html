<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Borrar Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
<div class="card mx-auto shadow" style="max-width: 500px;">
    <div class="card-header bg-danger text-white">¿Seguro que desea borrar la categoría?</div>
    <div class="card-body text-center">
        <h5 th:text="${categoria.nombre}">Categoría</h5>
        <div th:if="${error}" class="alert alert-warning" th:text="${error}"></div>
        <form th:action="@{/admin/categorias/borrar}" method="post" class="mt-4">
            <input type="hidden" name="id" th:value="${categoria.id}">
            <button type="submit" class="btn btn-danger px-4">Aceptar</button>
            <a th:href="@{/admin/categorias}" class="btn btn-outline-secondary px-4">Cancelar</a>
        </form>
    </div>
</div>
</body>
</html>
