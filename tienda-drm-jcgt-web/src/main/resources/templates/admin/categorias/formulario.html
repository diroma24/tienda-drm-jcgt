<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categoría - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-0">
                <div class="card-header bg-success text-white p-3">
                    <h2 class="h5 mb-0 fw-bold">Configuración de Categoría</h2>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/admin/categorias/nuevo}" th:object="${categoria}" method="post" autocomplete="off">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre de la Categoría</label>
                            <input type="text" class="form-control" th:field="*{nombre}"
                                   placeholder="Ej: Sobres de Mejora (Booster Packs)">
                            <div class="form-text">Use nombres claros que ayuden a la navegación.</div>
                        </div>

                        <div class="mb-4">
                            <label for="descripcion" class="form-label fw-bold">Descripción detallada</label>
                            <textarea class="form-control" rows="5" th:field="*{descripcion}"
                                      placeholder="Ej: Esta categoría incluye todos los paquetes sellados individuales de las últimas expansiones de Pokémon TCG..."></textarea>
                            <div class="form-text text-muted">La descripción aparecerá en la parte superior de la sección en la tienda.</div>
                        </div>

                        <div class="d-flex gap-2 border-top pt-3">
                            <button type="submit" class="btn btn-success px-4 fw-bold shadow-sm">Guardar Categoría</button>
                            <a th:href="@{/admin/categorias}" class="btn btn-outline-secondary px-4">Cancelar</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
