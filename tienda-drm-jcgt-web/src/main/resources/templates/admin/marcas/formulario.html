<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Marca - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark">
                    <h2 class="h5 mb-0 fw-bold">Crear Nueva Marca</h2>
                </div>
                <div class="card-body p-4">

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                    <form th:action="@{/admin/marcas/nuevo}" th:object="${marca}" method="post">

                        <div class="mb-4">
                            <label for="nombre" class="form-label fw-bold">Nombre de la Marca / Fabricante</label>
                            <input type="text" class="form-control" th:field="*{nombre}"
                                   placeholder="Ej: Nintendo, The Pokémon Company...">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning px-4 fw-bold">Aceptar</button>
                            <a th:href="@{/admin/marcas}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
