<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Marca - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark p-3">
                    <h2 class="h5 mb-0 fw-bold" th:text="${marca.id == null ? 'Registrar Nueva Marca' : 'Editar Marca: ' + marca.nombre}">Configuración de Marca</h2>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{${marca.id == null ? '/admin/marcas/nuevo' : '/admin/marcas/editar/' + marca.id}}"
                          th:object="${marca}" method="post" autocomplete="off">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre del Fabricante / Marca</label>
                            <input type="text" class="form-control" th:field="*{nombre}"
                                   placeholder="Ej: The Pokémon Company, Nintendo...">
                        </div>

                        <div class="mb-4">
                            <label for="descripcion" class="form-label fw-bold">Descripción de la Marca</label>
                            <textarea class="form-control" rows="4" th:field="*{descripcion}"
                                      placeholder="Historia o relevancia de este fabricante..."></textarea>
                        </div>

                        <div class="d-flex gap-2 border-top pt-3">
                            <button type="submit" class="btn btn-warning px-4 fw-bold shadow-sm">Guardar Marca</button>
                            <a th:href="@{/admin/marcas}" class="btn btn-outline-secondary px-4">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
