<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Borrado de Marca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
<div class="card mx-auto shadow border-0" style="max-width: 500px;">
    <div class="card-header bg-danger text-white fw-bold">Eliminar Marca</div>
    <div class="card-body text-center p-4">
        <p class="mb-3">¿Seguro que desea borrar la marca?</p>
        <h4 class="mb-4" th:text="${marca.nombre}">Nombre Marca</h4>

        <div th:if="${error}" class="alert alert-danger small mb-4" th:text="${error}"></div>

        <form th:action="@{/admin/marcas/borrar}" method="post">
            <input type="hidden" name="id" th:value="${marca.id}">
            <div class="d-flex justify-content-center gap-2">
                <button type="submit" class="btn btn-danger px-4">Aceptar</button>
                <a th:href="@{/admin/marcas}" class="btn btn-outline-secondary px-4">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
