<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white p-3">
                    <h2 class="h5 mb-0" th:text="${producto.id == null ? 'Crear Nuevo Producto' : 'Modificar Producto: ' + producto.nombre}"></h2>
                </div>

                <div class="card-body p-4">

                    <form th:action="@{${producto.id == null ? '/admin/productos/nuevo' : '/admin/productos/editar/' + producto.id}}"
                          th:object="${producto}" method="post" autocomplete="off">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre del Producto</label>
                            <input type="text" class="form-control" th:field="*{nombre}"
                                   placeholder="Ej: Elite Trainer Box - Pokémon GO">
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="precio" class="form-label fw-bold">Precio (€)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{precio}"
                                       placeholder="0.00">
                            </div>
                            <div class="col-md-6">
                                <label for="descuento" class="form-label fw-bold">Descuento (%)</label>
                                <input type="number" class="form-control" th:field="*{descuento}"
                                       placeholder="Ej: 10">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="codigoEan" class="form-label fw-bold">Código EAN-13</label>
                            <input type="text" class="form-control" th:field="*{codigoEan}"
                                   placeholder="8400000000000">
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-bold">Descripción</label>
                            <textarea class="form-control" rows="4" th:field="*{descripcion}"
                                      placeholder="Detalles del contenido, estado, rareza..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="marca" class="form-label fw-bold">Marca / Fabricante *</label>
                            <select class="form-select" th:field="*{marca}">
                                <option value="">-- Seleccione Marca --</option>
                                <option th:each="m : ${marcas}"
                                        th:value="${m.id}"
                                        th:text="${m.nombre}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold d-block">Categorías *</label>
                            <div class="border rounded p-3 bg-white" style="max-height: 180px; overflow-y: auto;">
                                <div th:each="cat : ${categorias}" class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{categorias}"
                                           th:value="${cat.id}">
                                    <label class="form-check-label" th:text="${cat.nombre}"></label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 pt-3 border-top">
                            <button type="submit" class="btn btn-primary px-4 fw-bold">
                                <span th:text="${producto.id == null ? 'Guardar Producto' : 'Actualizar Cambios'}"></span>
                            </button>
                            <a th:href="@{/admin/productos}" class="btn btn-outline-secondary px-4">Cancelar</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
