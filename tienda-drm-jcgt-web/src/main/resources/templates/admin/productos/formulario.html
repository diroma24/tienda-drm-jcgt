<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h2 class="h5 mb-0">Crear Nuevo Producto</h2>
                </div>
                <div class="card-body p-4">

                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

                    <form th:action="@{/admin/productos/nuevo}" th:object="${producto}" method="post">

                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre del Producto</label>
                            <input type="text" class="form-control" th:field="*{nombre}">
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="precio" class="form-label">Precio (€)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{precio}">
                            </div>
                            <div class="col-md-6">
                                <label for="descuento" class="form-label">Descuento (%)</label>
                                <input type="number" class="form-control" th:field="*{descuento}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label">Descripción</label>
                            <textarea class="form-control" rows="3" th:field="*{descripcion}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="codigoEan" class="form-label">Código EAN-13</label>
                            <input type="text" class="form-control" th:field="*{codigoEan}">
                        </div>

                        <div class="mb-3">
                            <label for="marca" class="form-label">Fabricante / Marca</label>
                            <select class="form-select" th:field="*{marca}">
                                <option value="">Seleccione una marca...</option>
                                <option th:each="m : ${marcas}"
                                        th:value="${m.id}"
                                        th:text="${m.nombre}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label d-block">Categorías del Producto</label>
                            <div class="border rounded p-3 bg-white">
                                <div th:each="cat : ${categorias}" class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{categorias}"
                                           th:value="${cat.id}">
                                    <label class="form-check-label" th:text="${cat.nombre}"></label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">Aceptar</button>
                            <a th:href="@{/admin/productos}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
