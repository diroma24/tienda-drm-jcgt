<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración - Listado de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/admin/estilos.css}">
</head>
<body class="bg-light">

<nav th:replace="~{admin/inicio :: nav}"></nav>

<main class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2">Gestión de Productos</h1>
        <a th:href="@{/admin/productos/nuevo}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nuevo Producto
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Marca</th>
                    <th class="text-center pe-4">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${productos}">
                    <td class="ps-4 fw-bold" th:text="${p.id}">1</td>
                    <td th:text="${p.nombre}">Nombre del Producto</td>
                    <td th:text="${#numbers.formatDecimal(p.precio, 1, 'POINT', 2, 'COMMA') + ' €'}">0,00 €</td>
                    <td th:text="${p.marca.nombre}">Marca</td>
                    <td class="text-center pe-4">
                        <div class="btn-group" role="group">
                            <a th:href="@{/admin/productos/{id}/edit(id=${p.id})}"
                               class="btn btn-outline-primary btn-sm"
                               title="Editar producto"
                               aria-label="Editar producto">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/admin/productos/{id}/delete(id=${p.id})}"
                               class="btn btn-outline-danger btn-sm"
                               title="Borrar producto"
                               aria-label="Borrar producto">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
                <tfoot class="table-light">
                <tr>
                    <td colspan="5" class="ps-4 small text-muted">
                        Total de elementos: <span th:text="${#lists.size(productos)}">0</span>
                    </td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/admin}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Volver al Panel
        </a>
    </div>
</main>

</body>
</html>
