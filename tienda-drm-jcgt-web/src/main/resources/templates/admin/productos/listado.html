<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Productos - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{admin/inicio :: nav}"></nav>

<main class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2">Gestión de Productos</h1>
        <a th:href="@{/admin/productos/nuevo}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nuevo Producto
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Marca</th>
                    <th class="text-center pe-4">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${productos}">
                    <td class="ps-4 fw-bold" th:text="${p.id}">1</td>
                    <td th:text="${p.nombre}">Nombre</td>
                    <td th:text="${#numbers.formatDecimal(p.precio, 1, 'POINT', 2, 'COMMA') + ' €'}">0,00 €</td>
                    <td th:text="${p.marca.nombre}">Marca</td>
                    <td class="text-center pe-4">
                        <div class="btn-group">
                            <a th:href="@{/admin/productos/editar/{id}(id=${p.id})}" class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a th:href="@{/admin/productos/borrar/{id}(id=${p.id})}" class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
