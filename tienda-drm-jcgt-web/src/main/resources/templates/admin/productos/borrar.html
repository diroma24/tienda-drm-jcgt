<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Borrado - Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-danger text-white">
                    <h2 class="h5 mb-0">Confirmar Eliminación</h2>
                </div>
                <div class="card-body p-4 text-center">
                    <div th:if="${error}" class="alert alert-warning border-danger text-danger mb-4" th:text="${error}"></div>

                    <p class="mb-4">¿Está seguro de que desea borrar el producto <br>
                        <strong th:text="${producto.nombre}">Nombre</strong>?</p>

                    <form th:action="@{/admin/productos/borrar}" method="post">
                        <input type="hidden" name="id" th:value="${producto.id}">

                        <div class="d-flex justify-content-center gap-3">
                            <button type="submit" class="btn btn-danger px-4">Aceptar (Eliminar)</button>
                            <a th:href="@{/admin/productos}" class="btn btn-outline-secondary px-4">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
